<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCA - Cadastro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h2>ARCA</h2>

    <nav>
      <a href="index.html">Início</a>
      <a href="adocao.html">Adoção</a>
      <a href="resgate.html">Resgate</a>
      <a href="denuncia.html">Denúncia</a>
      <a href="castracao.html">Castração</a>
      <a href="voluntario.html">Voluntariado</a>
    </nav>

    <button><a href="telalogin.html">Área do Usuário</a></button>
  </header>
    <main>
        <section>
            <p>Protegendo quem não tem voz.<br>Junte-se ao nosso programa de proteção animal e ajude a transformar a vida de milhares de animais domésticos.</p>
        </section>

        <form>
            <div>
                <label for="nome">Nome completo</label>
                <input id="nome" name="nome" type="text" placeholder="Digite seu nome completo">
            </div>
            <div>
                <label for="cpf">CPF</label>
                <input id="cpf" name="cpf" type="text" placeholder="Digite seu CPF">
            </div>
            <div>
                <label for="endereco">Endereço</label>
                <input id="endereco" name="endereco" type="text" placeholder="Digite seu endereço">
            </div>
            <div>
                <label for="cep">CEP</label>
                <input id="cep" name="cep" type="text" placeholder="Digite seu CEP">
            </div>
            <div>
                <label for="email">E-mail</label>
                <input id="email" name="email" type="email" placeholder="seu@email.com">
            </div>
            <div>
                <label for="senha">Senha</label>
                <input id="senha" name="senha" type="password" placeholder="Digite uma senha">
            </div>
            <div>
                <label for="confirma-senha">Confirme a senha</label>
                <input id="confirma-senha" name="confirma-senha" type="password" placeholder="Digite a senha novamente">
            </div>

            <button type="submit">Criar conta</button>
        </form>
    </main>
    <script src="./index.js"></script>
</body>
</html>
