        <section>
            <p>Protegendo quem não tem voz.<br>Junte-se ao nosso programa de proteção animal e ajude a transformar a vida de milhares de animais domésticos.</p>
        </section>

        <form>
            <div>
                <label for="nome">Nome completo</label>
                <input id="nome" name="nome" type="text" placeholder="Digite seu nome completo">
            </div>
            <div>
                <label for="cpf">CPF</label>
                <input id="cpf" name="cpf" type="text" placeholder="Digite seu CPF">

                <label for="endereco">Endereço</label>
                <input id="endereco" name="endereco" type="text" placeholder="Digite seu endereço">
            </div>
            <div>
                <label for="cep">CEP</label>
                <input id="cep" name="cep" type="text" placeholder="Digite seu CEP">
            </div>
            <div>
                <label for="email">E-mail</label>
                <input id="email" name="email" type="email" placeholder="seu@email.com">
            </div>
            <div>
                <label for="senha">Senha</label>
                <input id="senha" name="senha" type="password" placeholder="Digite uma senha">
            </div>
            <div>
                <label for="confirma-senha">Confirme a senha</label>
                <input id="confirma-senha" name="confirma-senha" type="password" placeholder="Digite a senha novamente">
            </div>

            <button type="submit">Criar conta</button>
        </form>
